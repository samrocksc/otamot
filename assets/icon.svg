<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="320" height="320">
  <!-- Tomato Body - Dark Red Shadow -->
  <rect x="3" y="12" width="1" height="1" fill="#8b0000"/>
  <rect x="4" y="12" width="2" height="1" fill="#8b0000"/>
  <rect x="6" y="13" width="2" height="1" fill="#8b0000"/>
  <rect x="8" y="13" width="2" height="1" fill="#8b0000"/>
  <rect x="10" y="12" width="2" height="1" fill="#8b0000"/>
  <rect x="12" y="12" width="1" height="1" fill="#8b0000"/>
  
  <!-- Tomato Body - Main Red -->
  <rect x="2" y="8" width="1" height="2" fill="#dc143c"/>
  <rect x="3" y="6" width="1" height="6" fill="#dc143c"/>
  <rect x="4" y="5" width="2" height="7" fill="#dc143c"/>
  <rect x="6" y="4" width="2" height="9" fill="#dc143c"/>
  <rect x="8" y="4" width="2" height="9" fill="#dc143c"/>
  <rect x="10" y="5" width="2" height="7" fill="#dc143c"/>
  <rect x="12" y="6" width="1" height="6" fill="#dc143c"/>
  <rect x="13" y="8" width="1" height="2" fill="#dc143c"/>
  
  <!-- Tomato Highlight - Light Red -->
  <rect x="4" y="6" width="1" height="1" fill="#ff6b6b"/>
  <rect x="5" y="5" width="1" height="2" fill="#ff6b6b"/>
  <rect x="6" y="5" width="1" height="1" fill="#ff6b6b"/>
  <rect x="4" y="7" width="1" height="1" fill="#ff4757"/>
  <rect x="5" y="7" width="2" height="1" fill="#ff4757"/>
  
  <!-- Stem - Dark Green -->
  <rect x="7" y="2" width="2" height="2" fill="#2d5a27"/>
  
  <!-- Leaves - Main Green -->
  <rect x="5" y="3" width="2" height="1" fill="#4a7c43"/>
  <rect x="4" y="4" width="2" height="1" fill="#4a7c43"/>
  <rect x="9" y="3" width="2" height="1" fill="#4a7c43"/>
  <rect x="10" y="4" width="2" height="1" fill="#4a7c43"/>
  
  <!-- Leaves - Light Green Highlight -->
  <rect x="5" y="3" width="1" height="1" fill="#6b9b37"/>
  <rect x="10" y="3" width="1" height="1" fill="#6b9b37"/>
</svg>
